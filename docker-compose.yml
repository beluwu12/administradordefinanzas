services:
  # ═══════════════════════════════════════════════════════════════
  # PostgreSQL Database
  # ═══════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: finanzas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finanzas}
      POSTGRES_USER: ${POSTGRES_USER:-finanzas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finanzas123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finanzas -d finanzas"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - finanzas-network

  # ═══════════════════════════════════════════════════════════════
  # Backend — Express + Prisma (dev mode with hot-reload)
  # ═══════════════════════════════════════════════════════════════
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: finanzas-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-finanzas}:${POSTGRES_PASSWORD:-finanzas123}@postgres:5432/${POSTGRES_DB:-finanzas}
      JWT_SECRET: ${JWT_SECRET:-finanzas-dev-jwt-secret-2024-local}
      NODE_ENV: development
      PORT: 3000
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:4173,http://localhost"
      CRON_ENABLED: "false"
      INSTANCE_ID: "1"
      LOG_LEVEL: "debug"
      FEATURE_RATE_LIMIT_ENABLED: "false"
      FEATURE_CSRF_ENABLED: "false"
      COOKIE_SAME_SITE: "lax"
    volumes:
      # Mount source code for hot-reload (exclude node_modules)
      - ./server:/app
      - /app/node_modules
      - /app/prisma/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finanzas-network

  # ═══════════════════════════════════════════════════════════════
  # Frontend — Vite dev server with HMR
  # ═══════════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./remix-of-fincontrol-insights
      dockerfile: Dockerfile.dev
    container_name: finanzas-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:3000/api"
    volumes:
      # Mount source code for HMR (exclude node_modules)
      - ./remix-of-fincontrol-insights:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - finanzas-network

volumes:
  postgres_data:

networks:
  finanzas-network:
    driver: bridge
